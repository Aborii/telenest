# ---------------------------------------------------------------------------
# PURPOSE
#   Tag-driven npm publish pipeline. When a `v*` tag is pushed (e.g. by the
#   interactive `npm run git:release` script), this workflow rebuilds and
#   verifies the library and publishes it to the npm registry.
#
# USAGE
#   Pushing a tag matching `v*` (for example `v1.2.0`) triggers the run. The
#   local release script (`scripts/release.mts`) already creates the GitHub
#   release and pushes the tag, so this workflow is scoped to the npm publish
#   step only — it does NOT create a GitHub release (that would duplicate it).
#
# REQUIRED SECRET
#   NPM_TOKEN  An npm automation token with publish rights to this package.
#
#   If NPM_TOKEN is NOT configured, the publish is SKIPPED with a warning
#   annotation instead of failing the run — so tagging a release without a
#   token is a no-op (plus a visible warning), never a red build. Add the
#   secret under Settings → Secrets and variables → Actions to enable the
#   actual publish.
#
# NOTE
#   This repository is currently private and released via GitHub only; the
#   npm publish path stays dormant until an NPM_TOKEN is provided, matching
#   the project's "GitHub-only unless a token is supplied" release policy.
# ---------------------------------------------------------------------------
name: Release (npm publish)

on:
  push:
    tags: ['v*']

# `id-token: write` is required so `npm publish --provenance` can mint a
# signed provenance attestation via OIDC; contents stay read-only.
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build & publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm
          # Configures the registry + writes an .npmrc that reads NODE_AUTH_TOKEN.
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      # Gate the publish on the same checks CI enforces, so a tag can never
      # ship a broken build.
      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      # Detect whether NPM_TOKEN is available. The `secrets` context cannot be
      # used directly in an `if:` expression, so it is mapped to an env var here
      # and exposed as a step output the publish step can branch on.
      - name: Check for npm token
        id: token
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "::warning title=npm publish skipped::NPM_TOKEN secret is not set — skipping the npm publish. Add NPM_TOKEN under Settings → Secrets and variables → Actions to enable publishing."
          fi

      # Default publishes with provenance to the public registry. Override via
      # the optional `NPM_PUBLISH_ARGS` repo variable (Settings → Secrets and
      # variables → Actions → Variables) to change the publish mode — e.g. drop
      # `--provenance` — without editing this workflow.
      - name: Publish to npm
        if: steps.token.outputs.has_token == 'true'
        run: npm publish ${{ vars.NPM_PUBLISH_ARGS || '--provenance --access public' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish skipped (no token)
        if: steps.token.outputs.has_token != 'true'
        run: echo "No NPM_TOKEN configured — npm publish was skipped. The tag and GitHub release (if any) are unaffected."
