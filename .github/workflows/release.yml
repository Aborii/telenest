# ---------------------------------------------------------------------------
# PURPOSE
#   Tag-driven npm publish pipeline. When a `v*` tag is pushed (e.g. by the
#   interactive `npm run git:release` script), this workflow rebuilds and
#   verifies the library and publishes it to the public npm registry using
#   npm Trusted Publishing (OIDC) — no long-lived npm token is involved.
#
# USAGE
#   Pushing a tag matching `v*` (for example `v1.2.0`) triggers the run. The
#   local release script (`scripts/release.mts`) already creates the GitHub
#   release and pushes the tag, so this workflow is scoped to the npm publish
#   step only — it does NOT create a GitHub release (that would duplicate it).
#
# AUTHENTICATION — npm Trusted Publishing (OIDC)
#   This workflow authenticates to npm via a short-lived OIDC token minted by
#   GitHub Actions, not a stored secret. For it to work, a Trusted Publisher
#   must be configured for the `telenest` package on npmjs.com pointing at:
#     organization/user : Aborii
#     repository        : telenest
#     workflow filename : release.yml      (this file's name; case-sensitive)
#   See https://docs.npmjs.com/trusted-publishers. There is NO NPM_TOKEN secret.
#
# REQUIREMENTS (enforced by npm Trusted Publishing)
#   - `id-token: write` permission on the publish job (minted OIDC token).
#   - npm CLI >= 11.5.1 and Node.js >= 22.14.0 — older toolchains cannot use
#     OIDC, so the job upgrades npm to the latest before publishing.
#   - GitHub-hosted runner (self-hosted runners are not supported).
#
# PROVENANCE
#   Publishing via OIDC from this public repo attaches a signed provenance
#   attestation automatically — no `--provenance` flag is needed. Package
#   access (`public`) comes from `publishConfig` in package.json.
# ---------------------------------------------------------------------------
name: Release (npm publish)

on:
  push:
    tags: ['v*']

# Default to read-only; the publish job adds `id-token: write` for OIDC.
permissions:
  contents: read

jobs:
  # ── Build, verify, and publish via Trusted Publishing (OIDC) ────────────
  publish:
    name: Build & publish to npm
    runs-on: ubuntu-latest
    # `id-token: write` lets npm mint the short-lived OIDC token that proves
    # this run's identity to the registry and signs the provenance attestation;
    # contents stay read-only.
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Trusted Publishing requires Node >= 22.14.0.
          node-version: '22.x'
          cache: npm
          # Point the CLI at the public registry (no auth token is written;
          # publishing authenticates via OIDC instead).
          registry-url: https://registry.npmjs.org

      # Trusted Publishing requires npm >= 11.5.1, newer than the npm bundled
      # with Node 22.x — upgrade the CLI before any publish-related step.
      - name: Upgrade npm to latest (OIDC requires >= 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      # Gate the publish on the same checks CI enforces, so a tag can never
      # ship a broken build.
      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      # Authenticates via the OIDC token minted by `id-token: write`; provenance
      # and `public` access are applied automatically (CI + publishConfig), so
      # no flags, no NODE_AUTH_TOKEN, and no NPM_TOKEN secret are required.
      - name: Publish to npm
        run: npm publish
